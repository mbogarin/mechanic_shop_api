# = Initialization:
swagger: "2.0"
info:
    title: "Mechanic Shop API"
    description: "REST API for managing customers, mechanics, service tickets, and inventory parts for a mechanic shop. Protected customer routes require a JWT Bearer token returned by the customer login endpoint."
    version: "1.0.0"
host: "127.0.0.1:5000"
schemes:
    - "http"
consumes:
    - "application/json"
produces:
    - "application/json"

tags:
    - name: "Customers"
      description: "Customer accounts, authentication, and customer service tickets"
    - name: "Mechanics"
      description: "Mechanic management and ticket rankings"
    - name: "Service Tickets"
      description: "Service ticket creation and relationship management"
    - name: "Inventory"
      description: "Inventory part management"

# = Authentication/Authorization:
securityDefinitions:
    bearerAuth:
        type: apiKey
        name: Authorization
        in: header

# = Paths:
paths:
    # > Customers endpoints:
    # 1. Create customers:
    /customers/:
        post:
            tags: ["Customers"]
            summary: "Create a customer"
            description: "Creates a new customer account. Customer email addresses must be unique."
            operationId: "createCustomer"
            parameters:
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/CustomerInput"
            responses:
                "201":
                    description: "Customer created successfully"
                    schema:
                        $ref: "#/definitions/Customer"
                "400":
                    description: "Validation error or email already associated with an account"
                    schema:
                        $ref: "/#definitions/ErrorResponse"

        # 2. Get all customers:
        get:
            tags: ["Customers"]
            summary: "Get all customers"
            description: "Returns customers using page-based pagination."
            operationId: "getCustomers"
            parameters:
                - in: "query"
                  name: "page"
                  type: "integer"
                  format: "int32"
                  default: 1
                  minimum: 1
                  description: "Page number"
                - in: "query"
                  name: "per_page"
                  type: "integer"
                  format: "int32"
                  default: 5
                  minimum: 1
                  description: "Number of customers per page"
            responses:
                "200":
                    description: "Paginated customer results"
                    schema:
                        $ref: "#/definitions/PaginatedCustomers"

        # 3. Update customer:
        put:
            tags: ["Customers"]
            summary: "Update the authenticated customer"
            description: "Updates the customer identified by the JWT subject. The current route validates a complete customer payload."
            operationId: "updateCustomer"
            security:
                - BearerAuth: []
            parameters:
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/CustomerInput"
            responses:
                "200":
                    description: "Customer updated successfully"
                    schema:
                        $ref: "#/definitions/Customer"
                "400":
                    description: "Validation error"
                    schema:
                        $ref: "#/definitions/ValidationError"
                "401":
                    description: "Missing, invalid, or expired token"
                    schema:
                        $ref: "#/definitions/MessageResponse"
                "404":
                    description: "Customer not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

        # 4. Delete customer:
        delete:
            tags: ["Customers"]
            summary: "Delete the authenticated customer"
            description: "Deletes the customer identified by the JWT subject. Related service tickets are deleted by the model cascade."
            operationId: "deleteCustomer"
            security:
                - BearerAuth: []
            responses:
                "200":
                    description: "Customer deleted successfully"
                    schema:
                        $ref: "#/definitions/MessageResponse"
                "401":
                    description: "Missing, invalid, or expired token"
                    schema:
                        $ref: "#/definitions/MessageResponse"
                "404":
                    description: "Customer not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

    # 5. Get single customer:
    /customers/{customer_id}:
        get:
            tags: ["Customers"]
            summary: "Get single customer"
            operationId: "getCustomer"
            parameters:
                - $ref: "#/parameters/CustomerId"
            responses:
                "200":
                    description: "Customer found"
                    schema:
                        $ref: "#/definitions/Customer"
                "404":
                    description: "Customer not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

    # 6. Login:
    /customers/login:
        post:
            tags: ["Customers"]
            summary: "Log in a customer"
            description: "Validates email and password and returns a JWT that expires after one hour."
            operationId: "loginCustomer"
            parameters:
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/LoginInput"
            responses:
                "200":
                    description: "Login successful"
                    schema:
                        $ref: "#/definitions/LoginResponse"
                "400":
                    description: "Validation error"
                    schema:
                        $ref: "#/definitions/ValidationError"
                "401":
                    description: "Invalid email or password"
                    schema:
                        $ref: "#/definitions/MessageResponse"

    # 7. Get customer tickets:
    /customers/my-tickets:
        get:
            tags: ["Customers"]
            summary: "Get the authenticated customer's service tickets"
            description: "Returns service tickets whose customer_id matches the JWT subject."
            operationId: "getMyTickets"
            security:
                - BearerAuth: []
            responses:
                "200":
                    description: "Customer service tickets"
                    schema:
                        type: "array"
                        items:
                            $ref: "#/definitions/ServiceTicket"
                "401":
                    description: "Missing, invalid, or expired token"
                    schema:
                        $ref: "#/definitions/MessageResponse"

    # > Mechanics endpoints:
    # 1. Create mechanic:
    /mechanics/:
        post:
            tags: ["Mechanics"]
            summary: "Create a mechanic"
            operationId: "createMechanic"
            parameters:
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/MechanicInput"
            responses:
                "201":
                    description: "Mechanic created successfully"
                    schema:
                        $ref: "#/definitions/Mechanic"
                "400":
                    description: "Validation error"
                    schema:
                        $ref: "#/definitions/ValidationError"

        # 2. Get all mechanics:
        get:
            tags: ["Mechanics"]
            summary: "Get all mechanics"
            operationId: "getMechanics"
            responses:
                "200":
                    description: "All mechanics"
                    schema:
                        type: "array"
                        items:
                            $ref: "#/definitions/Mechanic"

    # 3. Update mechanic:
    /mechanics/{mechanic_id}:
        put:
            tags: ["Mechanics"]
            summary: "Update a mechanic"
            description: "The current route validates a complete mechanic payload."
            operationId: "updateMechanic"
            parameters:
                - $ref: "#/parameters/MechanicId"
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/MechanicInput"
            responses:
                "200":
                    description: "Mechanic updated successfully"
                    schema:
                        $ref: "#/definitions/Mechanic"
                "400":
                    description: "Validation error"
                    schema:
                        $ref: "#/definitions/ValidationError"
                "404":
                    description: "Mechanic not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

        # 4. Delete mechanic:
        delete:
            tags: ["Mechanics"]
            summary: "Delete a mechanic"
            operationId: "deleteMechanic"
            parameters:
                - $ref: "#/parameters/MechanicId"
            responses:
                "200":
                    description: "Mechanic deleted successfully"
                    schema:
                        $ref: "#/definitions/MessageResponse"
                "404":
                    description: "Mechanic not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

    # 5. Rank mechanics by most tickets assigned:
    /mechanics/most-tickets:
        get:
            tags: ["Mechanics"]
            summary: "Rank mechanics by assigned ticket count"
            description: "Returns mechanics sorted from the greatest to the fewest assigned service tickets."
            operationId: "rankMechanicsByMostTickets"
            responses:
                "200":
                    description: "Ranked mechanics"
                    schema:
                        type: "array"
                        items:
                            $ref: "#/definitions/MechanicTicketCount"

    # > Inventory endpoints:
    # 1. Create inventory part:
    /inventory/:
        post:
            tags: ["Inventory"]
            summary: "Create an inventory part"
            operationId: "createInventoryPart"
            parameters:
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/InventoryInput"
            responses:
                "201":
                    description: "Inventory part created successfully"
                    schema:
                        $ref: "#/definitions/InventoryPart"
                "400":
                    description: "Validation error"
                    schema:
                        $ref: "#/definitions/ValidationError"

        # 2. Get all inventory parts:
        get:
            tags: ["Inventory"]
            summary: "Get all inventory parts"
            operationId: "getInventoryParts"
            responses:
                "200":
                    description: "All inventory parts"
                    schema:
                        type: "array"
                        items:
                            $ref: "#/definitions/InventoryPart"

    # 3. Get single inventory part:
    /inventory/{part_id}:
        get:
            tags: ["Inventory"]
            summary: "Get single inventory part"
            operationId: "getInventoryPart"
            parameters:
                - $ref: "#/parameters/PartId"
            responses:
                "200":
                    description: "Inventory part found"
                    schema:
                    $ref: "#/definitions/InventoryPart"
                "404":
                    description: "Inventory part not found"
                    schema:
                    $ref: "#/definitions/MessageResponse"

        # 4. Update inventory part:
        put:
            tags: ["Inventory"]
            summary: "Update an inventory part"
            description: "Supports partial updates to name and/or price."
            operationId: "updateInventoryPart"
            parameters:
                - $ref: "#/parameters/PartId"
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/InventoryUpdateInput"
            responses:
                "200":
                    description: "Inventory part updated successfully"
                    schema:
                        $ref: "#/definitions/InventoryPart"
                "400":
                    description: "Validation error"
                    schema:
                        $ref: "#/definitions/ValidationError"
                "404":
                    description: "Inventory part not found"
                    schema:
                        $ref: "#/definitions/MessageResponse"

        # 5. Delete inventory part:
        delete:
            tags: ["Inventory"]
            summary: "Delete an inventory part"
            operationId: "deleteInventoryPart"
            parameters:
                - $ref: "#/parameters/PartId"
            responses:
                "200":
                    description: "Inventory part deleted successfully"
                    schema:
                        $ref: "#/definitions/MessageResponse"
                "404":
                    description: "Inventory part not found"
                    schema:
                        $ref: "#/definitions/MessageResponse"

    # > Service Tickets endpoints:
    # 1. Create service ticket:
    /service-tickets/:
        post:
            tags: ["Service Tickets"]
            summary: "Create a service ticket"
            description: "Creates a ticket for an existing customer. VIN values must be unique."
            operationId: "createServiceTicket"
            parameters:
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/ServiceTicketInput"
            responses:
                "201":
                    description: "Service ticket created successfully"
                    schema:
                        $ref: "#/definitions/ServiceTicket"
                "400":
                    description: "Validation error or duplicate VIN"
                    schema:
                        $ref: "#/definitions/ErrorResponse"
                "404":
                    description: "Customer not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

        # 2. Get all service tickets:
        get:
            tags: ["Service Tickets"]
            summary: "Get all service tickets"
            description: "Returns all tickets. This route is cached for 60 seconds."
            operationId: "getServiceTickets"
            responses:
                "200":
                    description: "All service tickets"
                    schema:
                        type: "array"
                        items:
                            $ref: "#/definitions/ServiceTicket"

    # 3. Assign service ticket mechanics:
    /service-tickets/{ticket_id}/assign-mechanic/{mechanic_id}:
        put:
            tags: ["Service Tickets"]
            summary: "Assign a mechanic to a service ticket"
            description: "Adds an existing mechanic to an existing ticket. Limited to five requests per hour per client IP."
            operationId: "assignMechanic"
            parameters:
                - $ref: "#/parameters/TicketId"
                - $ref: "#/parameters/MechanicId"
            responses:
                "200":
                    description: "Mechanic assigned, or mechanic was already assigned"
                    schema:
                        $ref: "#/definitions/ServiceTicketOrMessage"
                "404":
                    description: "Service ticket or mechanic not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"
                "429":
                    description: "Assignment rate limit exceeded"
                    schema:
                        $ref: "#/definitions/RateLimitResponse"

    # 4. Remove service ticket mechanics:
    /service-tickets/{ticket_id}/remove-mechanic/{mechanic_id}:
        put:
            tags: ["Service Tickets"]
            summary: "Remove a mechanic from a service ticket"
            operationId: "removeMechanic"
            parameters:
                - $ref: "#/parameters/TicketId"
                - $ref: "#/parameters/MechanicId"
            responses:
                "200":
                    description: "Mechanic removed, or mechanic was not assigned"
                    schema:
                        $ref: "#/definitions/ServiceTicketOrMessage"
                "404":
                    description: "Service ticket or mechanic not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

    # 5. Add/Remove service ticket mechanics:
    /service-tickets/{ticket_id}/edit:
        put:
            tags: ["Service Tickets"]
            summary: "Add and remove multiple mechanics on a service ticket"
            description: "Adds mechanic IDs from add_ids and removes mechanic IDs from remove_ids. Missing or unrelated IDs are ignored by the current route logic."
            operationId: "editTicketMechanics"
            parameters:
                - $ref: "#/parameters/TicketId"
                - in: "body"
                  name: "body"
                  required: true
                  schema:
                      $ref: "#/definitions/EditTicketMechanicsInput"
            responses:
                "200":
                    description: "Ticket mechanic assignments updated"
                    schema:
                        $ref: "#/definitions/EditedServiceTicket"
                "400":
                    description: "Validation error or invalid request data"
                    schema:
                        $ref: "#/definitions/ErrorResponse"
                "404":
                    description: "Service ticket not found"
                    schema:
                        $ref: "#/definitions/ErrorResponse"

    # 6. Add inventory part to service ticket:
    /service-tickets/{ticket_id}/add-part/{part_id}:
        put:
            tags: ["Service Tickets"]
            summary: "Add an inventory part to a service ticket"
            operationId: "addPartToTicket"
            parameters:
                - $ref: "#/parameters/TicketId"
                - $ref: "#/parameters/PartId"
            responses:
                "200":
                    description: "Inventory part added to the ticket"
                    schema:
                        $ref: "#/definitions/ServiceTicket"
                "400":
                    description: "Part is already added to the ticket"
                    schema:
                        $ref: "#/definitions/MessageResponse"
                "404":
                    description: "Service ticket or inventory part not found"
                    schema:
                        $ref: "#/definitions/MessageResponse"

# = Definitions:
parameters:

definitions:

